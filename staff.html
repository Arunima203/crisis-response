<!DOCTYPE html>
<html>
<head>
  <title>Staff Dashboard</title>

  <!-- Leaflet Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🚨 Staff Dashboard</h2>

<!-- Stats Boxes -->
<div class="stats-container">
  <div class="stat-box critical">
    <span id="criticalCount">0</span>
    <label>🔴 Critical</label>
  </div>
  <div class="stat-box pending">
    <span id="pendingCount">0</span>
    <label>🟡 Pending</label>
  </div>
  <div class="stat-box resolved">
    <span id="resolvedCount">0</span>
    <label>🟢 Resolved</label>
  </div>
</div>

<!-- Alert Lists by Status -->
<div class="alerts-container">
  <div class="alert-column">
    <h3>🔴 Critical Alerts</h3>
    <ul id="criticalList" class="alert-list"></ul>
  </div>
  <div class="alert-column">
    <h3>🟡 Pending Alerts</h3>
    <ul id="pendingList" class="alert-list"></ul>
  </div>
  <div class="alert-column">
    <h3>🟢 Resolved Alerts</h3>
    <ul id="resolvedList" class="alert-list"></ul>
  </div>
</div>

<!-- Time-wise Alert History -->
<div class="history-section">
  <h3>📜 Alert History (Time-wise)</h3>
  <ul id="historyList" class="history-list"></ul>
</div>

<!-- Map -->
<div id="map" style="height:400px;"></div>

<script>
let map = L.map('map').setView([22.57, 88.36], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'Map'
}).addTo(map);

let markers = [];
let alerts = [];

// Fetch alerts
setInterval(() => {
  fetch("/alerts")
    .then(res => res.json())
    .then(data => {
      alerts = data;
      updateDashboard();
    });
}, 3000);

function updateDashboard() {
  // Filter alerts by status
  const critical = alerts.filter(a => a.status === 'critical');
  const pending = alerts.filter(a => a.status === 'pending' || !a.status);
  const resolved = alerts.filter(a => a.status === 'resolved');

  // Update counts
  document.getElementById("criticalCount").innerText = critical.length;
  document.getElementById("pendingCount").innerText = pending.length;
  document.getElementById("resolvedCount").innerText = resolved.length;

  // Update status lists
  updateList("criticalList", critical, "critical");
  updateList("pendingList", pending, "pending");
  updateList("resolvedList", resolved, "resolved");

  // Update time-wise history (newest first)
  const sortedAlerts = [...alerts].sort((a, b) => new Date(b.time) - new Date(a.time));
  updateHistoryList(sortedAlerts);

  // Update map markers
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  alerts.forEach(alert => {
    const color = alert.status === 'resolved' ? 'green' : (alert.status === 'pending' ? 'orange' : 'red');
    const marker = L.marker([alert.lat, alert.lng])
      .addTo(map)
      .bindPopup(`<b>${alert.message}</b><br>Status: ${alert.status || 'pending'}<br>Time: ${new Date(alert.time).toLocaleString()}`);
    markers.push(marker);
  });
}

function updateList(elementId, alertArray, status) {
  const list = document.getElementById(elementId);
  if (alertArray.length === 0) {
    list.innerHTML = '<li class="empty">No alerts</li>';
    return;
  }

  list.innerHTML = alertArray.map((alert) => `
    <li class="alert-item ${status}">
      <div class="alert-info">
        <strong>${alert.message}</strong>
        <span>⏰ ${new Date(alert.time).toLocaleString()}</span>
        <span>📍 ${alert.lat.toFixed(4)}, ${alert.lng.toFixed(4)}</span>
      </div>
      <div class="alert-actions">
        ${status === 'critical' ? `<button onclick="updateStatus('${alert.time}', 'pending')">🟡</button>` : ''}
        ${status !== 'resolved' ? `<button onclick="updateStatus('${alert.time}', 'resolved')">✅</button>` : ''}
      </div>
    </li>
  `).join('');
}

function updateHistoryList(alertArray) {
  const list = document.getElementById("historyList");
  if (alertArray.length === 0) {
    list.innerHTML = '<li class="empty">No alert history</li>';
    return;
  }

  list.innerHTML = alertArray.map((alert) => {
    const statusIcon = alert.status === 'resolved' ? '🟢' : (alert.status === 'pending' ? '🟡' : '🔴');
    return `
      <li class="history-item">
        <span class="status-icon">${statusIcon}</span>
        <div class="history-info">
          <strong>${alert.message}</strong>
          <span class="time">⏰ ${new Date(alert.time).toLocaleString()}</span>
          <span class="location">📍 ${alert.lat.toFixed(5)}, ${alert.lng.toFixed(5)}</span>
        </div>
        <div class="history-actions">
          ${alert.status !== 'resolved' ? `<button onclick="updateStatus('${alert.time}', 'resolved')">✅</button>` : ''}
        </div>
      </li>
    `;
  }).join('');
}

function updateStatus(alertTime, newStatus) {
  const alert = alerts.find(a => a.time === alertTime);
  if (alert) {
    alert.status = newStatus;
    updateDashboard();
  }
}
</script>

</body>
</html>

</html>
